    description: "Issued for Construction"
    short: "IFC"
  - code: "1"
    description: "Re-Issued for Construction"
    short: "Re-IFC"
  - code: "ASB"
    description: "As-Built"
    short: "ASB"
  - code: "IFI"
    description: "Issued for Information"
    short: "IFI"

