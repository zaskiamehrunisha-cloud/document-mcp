# =============================================================================
# DOCINTEL - Validation Rules Configuration
# Derived from reference documents and project standards
# =============================================================================

# -----------------------------------------------------------------------------
# Document Number Grammar
# Pattern: ^[A-Z]{3}-[A-Z]-[A-Z]{2}-\d{2}-\d{3}$
# Example: ARG-E-LO-00-006
#   ARG = Project code (3 letters)
#   E   = Discipline (1 letter)
#   LO  = Drawing type (2 letters)
#   00  = Area code (2 digits)
#   006 = Sequence (3 digits)
# -----------------------------------------------------------------------------
document_number:
  regex: "^[A-Z]{3}-[A-Z]-[A-Z]{2}-\\d{2}-\\d{3}$"
  description: "Project code (3) - Discipline (1) - Drawing type (2) - Area (2) - Sequence (3)"
  examples:
    - "ARN-E-IN-00-001"
    - "ARG-E-LO-00-006"
    - "ARG-E-LO-00-007"

# -----------------------------------------------------------------------------
# Contract Number
# -----------------------------------------------------------------------------
contract_number: "3500003752"

# -----------------------------------------------------------------------------
# Title Block Required Fields
# These fields must be present in every controlled drawing
# -----------------------------------------------------------------------------
title_block_required_fields:
  - "DOCUMENT NO."
  - "CONTRACTOR DOC NO."
  - "REV."
  - "CONTRACT NO."
